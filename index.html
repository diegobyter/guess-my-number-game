<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Guess My Number Game</title>
</head>

<body>
    <header>
        <button id="play-again-btn">Play Again!</button>
        <div>
            <p>🏆 Highscore: <span id="highscore">0</span></p>
            <p>🔔 Score now: <span id="current-score">20</span></p>
        </div>
    </header>
    <main>
        <h1>Guess My Number!</h1>
        <p id="target-number">?</p>
    </main>
    <footer>
        <p class="blink" id="message">&lt;Input a number between 1 and 20&gt;</p>
        <div>
            <input type="number" name="" min="1" max="20" step="1" id="user-input">
            <button id="check-btn">Check!</button>
        </div>
    </footer>
    <script src="./js/script.js"></script>
</body>

</html>
