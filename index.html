<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Guess My Number Game</title>
</head>

<body>
    <header>
        <div>
            <select name="cars" id="language-select">
                <option value="en">🇺🇸 English</option>
                <option value="pt">🇧🇷 Português</option>
            </select>
        </div>
        <div>
            <p>🏆 Highscore: <span id="highscore">0</span></p>
            <p>🔔 Score: <span id="current-score">20</span></p>
        </div>
    </header>
    <main>
        <h1>Guess My Number!</h1>
        <p id="secret-number">?</p>
    </main>
    <footer>
        <p class="blink" id="message">&lt;Input a number between 1 and 20&gt;</p>
        <input id="user-input" type="number" name="" min="1" max="20" step="1">
        <button id="submit-btn">Submit</button>
    </footer>
    <script src="./js/main.js" type="module"></script>
</body>

</html>
